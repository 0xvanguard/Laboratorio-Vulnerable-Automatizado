# =============================================================================
# nginx.conf - Configuracion GLOBAL del proxy reverso (mal configurado).
# =============================================================================
# Cada directiva marcada con [MISCONFIG #N] es intencional y se documenta en
# docs/VULNERABILIDADES.md.
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------
    # [MISCONFIG #1] Divulgacion de version del servidor.
    # En produccion deberia ser "off" y, mejor aun, usar more_set_headers
    # para reescribir la cabecera Server.
    # ---------------------------------------------------------------------
    server_tokens on;

    # ---------------------------------------------------------------------
    # [MISCONFIG #2] Logs sin sanitizacion.
    # Logueamos User-Agent, Referer, X-Forwarded-For tal cual los manda el
    # cliente: util para entrenar log injection y log poisoning.
    # ---------------------------------------------------------------------
    log_format  lab_combined  '$remote_addr - $remote_user [$time_local] '
                              '"$request" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent" '
                              'xff="$http_x_forwarded_for" '
                              'xri="$http_x_real_ip" '
                              'host="$host"';

    access_log  /var/log/nginx/access.log  lab_combined;

    sendfile        on;
    keepalive_timeout  65;

    # ---------------------------------------------------------------------
    # [MISCONFIG #3] Sin limites de tamano de cuerpo.
    # Permite subir ficheros enormes => vector de DoS y abuso de espacio.
    # ---------------------------------------------------------------------
    client_max_body_size 0;

    # ---------------------------------------------------------------------
    # [MISCONFIG #4] Confianza ciega en cabeceras inyectadas por el cliente.
    # set_real_ip_from 0.0.0.0/0; permite spoofear la IP de origen via
    # X-Forwarded-For desde cualquier lado.
    # ---------------------------------------------------------------------
    set_real_ip_from   0.0.0.0/0;
    real_ip_header     X-Forwarded-For;
    real_ip_recursive  on;

    # ---------------------------------------------------------------------
    # [MISCONFIG #5] Sin cabeceras de seguridad por defecto.
    # No se anaden X-Frame-Options, X-Content-Type-Options, CSP,
    # Strict-Transport-Security, Referrer-Policy ni Permissions-Policy.
    # ---------------------------------------------------------------------

    # Resolver para upstreams por nombre DNS de Docker
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Mapas usados por los vhosts
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---------------------------------------------------------------------
    # gzip habilitado tambien sobre respuestas con cookies => CRIME-friendly
    # [MISCONFIG #6]
    # ---------------------------------------------------------------------
    gzip              on;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length   16;

    include /etc/nginx/conf.d/*.conf;
}
