# =============================================================================
# Vhost principal del laboratorio - puerto 80
# Sirve la landing page y rutea hacia DVWA, Juice Shop y phpMyAdmin.
# Contiene multiples misconfiguraciones intencionales (ver VULNERABILIDADES.md).
#
# Nota tecnica: usamos `set $upstream ...` + `proxy_pass http://$upstream...`
# en lugar de bloques `upstream { server X; }` para diferir la resolucion DNS
# al runtime. Asi el proxy arranca aunque las apps de detras tarden en estar
# disponibles, y `nginx -t` no falla por hostnames Docker.
# =============================================================================

# -----------------------------------------------------------------------------
# Vhost por defecto (puerto 80) - landing + ruteo por path
# -----------------------------------------------------------------------------
server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    access_log  /var/log/nginx/lab.access.log  lab_combined;
    error_log   /var/log/nginx/lab.error.log   warn;

    root  /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # [MISCONFIG #7] stub_status sin ACL. En produccion deberia restringirse.
    # -------------------------------------------------------------------------
    location = /nginx_status {
        stub_status on;
        access_log  off;
        # allow 10.0.0.0/8;  # <- linea comentada a proposito
        # deny  all;         # <- linea comentada a proposito
    }

    # Health para el HEALTHCHECK del contenedor
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # -------------------------------------------------------------------------
    # [MISCONFIG #8] Path traversal por alias mal cerrado.
    # /assets es alias a /usr/share/nginx/html/static/, pero el location no
    # termina en "/". Permite /assets../<archivo> y escapar del directorio.
    # -------------------------------------------------------------------------
    location /assets {
        alias /usr/share/nginx/html/static/;
        autoindex on;          # [MISCONFIG #9] listado de directorio publico
        autoindex_exact_size off;
        autoindex_localtime  on;
    }

    # -------------------------------------------------------------------------
    # [MISCONFIG #10] /backup expone archivos sensibles plantados a proposito.
    # -------------------------------------------------------------------------
    location /backup/ {
        alias /usr/share/nginx/html/static/;
        autoindex on;
    }

    # -------------------------------------------------------------------------
    # DVWA en /dvwa/  ([MISCONFIG #11] reescritura debil)
    # -------------------------------------------------------------------------
    location /dvwa/ {
        set $up_dvwa "dvwa";
        rewrite ^/dvwa/?(.*)$ /$1 break;
        proxy_pass         http://$up_dvwa:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Sin proxy_hide_header => se filtran cabeceras del backend
    }

    # Juice Shop en /juice/
    location /juice/ {
        set $up_juice "juice-shop";
        rewrite ^/juice/?(.*)$ /$1 break;
        proxy_pass         http://$up_juice:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # [MISCONFIG #12] phpMyAdmin publicado sin auth ni ACL.
    # -------------------------------------------------------------------------
    location /dbadmin/ {
        set $up_pma "phpmyadmin";
        rewrite ^/dbadmin/?(.*)$ /$1 break;
        proxy_pass         http://$up_pma:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # [MISCONFIG #13] No se bloquean ficheros sensibles servidos como estaticos.
    # .git, .env, .htaccess, dump.sql, *.bak son perfectamente accesibles si
    # apareciesen en el directorio raiz del proxy.
    # -------------------------------------------------------------------------
    # (intencionalmente NO existen "location ~ /\.git" ni similares)

    # -------------------------------------------------------------------------
    # [MISCONFIG #14] Metodos HTTP peligrosos permitidos: TRACE, OPTIONS verbosos.
    # -------------------------------------------------------------------------

    # -------------------------------------------------------------------------
    # [MISCONFIG #15] Errores 5xx no enmascarados.
    # -------------------------------------------------------------------------
    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        internal;
    }
}

# -----------------------------------------------------------------------------
# Vhost "directo" para DVWA en puerto 81
# -----------------------------------------------------------------------------
server {
    listen       81 default_server;
    server_name  _;
    access_log   /var/log/nginx/dvwa.access.log lab_combined;

    location / {
        set $up_dvwa "dvwa";
        proxy_pass         http://$up_dvwa:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}

# -----------------------------------------------------------------------------
# Vhost "directo" para Juice Shop en puerto 82
# -----------------------------------------------------------------------------
server {
    listen       82 default_server;
    server_name  _;
    access_log   /var/log/nginx/juice.access.log lab_combined;

    location / {
        set $up_juice "juice-shop";
        proxy_pass         http://$up_juice:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}

# -----------------------------------------------------------------------------
# [MISCONFIG #16] stub_status en su propio puerto (8088) sin filtrado.
# -----------------------------------------------------------------------------
server {
    listen       8088 default_server;
    server_name  _;
    access_log   off;

    location = / {
        stub_status on;
    }
}
